    - 0 <= p0 < 14
    - 0 <= q0 < 14
    - 0 <= c0 < 3
    - 0 <= m0 < 768
    - 0 <= r0 < 16
    - 0 <= s0 < 16
    renames: {output: T0, input: I0, weight: W0}
