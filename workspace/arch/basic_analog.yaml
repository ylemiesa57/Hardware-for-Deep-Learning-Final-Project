# Basic analog CiM macro for Lab 5.
# A simple analog compute-in-memory macro for exploring RRAM-based
# accelerator energy, ADC resolution, and bit slicing trade-offs.

{{include_text('_include.yaml')}}
{{add_to_path('./memory_cells')}}

{% set ARRAY_ROWS = ARRAY_ROWS | default(128) %}
{% set ARRAY_COLS = ARRAY_COLS | default(128) %}
{% set VOLTAGE_DAC_RESOLUTION = VOLTAGE_DAC_RESOLUTION | default(1) %}
{% set TEMPORAL_DAC_RESOLUTION = TEMPORAL_DAC_RESOLUTION | default(1) %}
{% set BITS_PER_CELL = BITS_PER_CELL | default(2) %}
{% set ADC_RESOLUTION = ADC_RESOLUTION | default(8) %}
{% set in_out_buf_enabled = in_out_buf_enabled | default(False) %}

arch:
  variables:
    <<: *variables_global
    # ===========================================================================
    # Encoding-dependent parameters
    # ===========================================================================
    encoded_input_bits:  input_bits
    encoded_weight_bits: weight_bits
    encoded_output_bits: output_bits

    input_encoding_func: offset_encode_hist
    weight_encoding_func: offset_encode_hist

    signed_sum_across_inputs: False
    signed_sum_across_weights: False

    # ===========================================================================
    # Architecture & CiM Array Structure
    # ===========================================================================
    cim_unit_width_cells:  1
    cim_unit_depth_cells:  1
    bits_per_cell:         {{BITS_PER_CELL}}

    # ===========================================================================
    # Data Converters
    # ===========================================================================
    adc_resolution: {{ADC_RESOLUTION}}
    voltage_dac_resolution: {{VOLTAGE_DAC_RESOLUTION}}
    temporal_dac_resolution: {{TEMPORAL_DAC_RESOLUTION}}

    n_adcs_per_bank: {{ARRAY_COLS}}

    # ===========================================================================
    # Hardware
    # ===========================================================================
    cycle_period: 1e-9
    read_pulse_width: 1e-9

  extra_attributes_for_all_component_models:
    <<: *cim_component_attributes
    tech_node: tech_node
    cycle_period: cycle_period

  nodes:
{% if in_out_buf_enabled %}
  - !Memory # Input buffer
    name: InputBuffer
    tensors: {keep: input}
    size: array_parallel_inputs * supported_input_bits * 256
    component_class: SmartBufferSRAM

  - !Memory # Output buffer
    name: OutputBuffer
    tensors: {keep: output}
    size: array_parallel_outputs * supported_output_bits * 256
    component_class: SmartBufferSRAM

  - !Toll # Shift+add sums outputs from multiple slices
    name: ShiftAdd
    tensors: {keep: output}
    direction: up
    bits_per_action: average_output_bits_per_sliced_psum
    component_class: ISAACShiftAdd
    extra_attributes_for_component_model:
      n_bits: supported_output_bits
      shift_register_n_bits: supported_output_bits * 2
{% endif %}

  - !Toll # ADC: Column readout
    name: ADC
    tensors: {keep: output}
    direction: up
    bits_per_action: average_output_bits_per_sliced_psum
    component_class: ADC
    energy_scale: adc_energy_scale
    area_scale: adc_area_scale
    extra_attributes_for_component_model:
      throughput_scale: 1
      throughput: 1 / cycle_period * cols_active_at_once * throughput_scale
      n_bits: adc_resolution
    # We've been calculating ADC utilization based on the energy of the ADC, and we
    # don't want leak power to mess up the calculation.
    leak_power: 0

  - !Toll # Column drivers precharge the array columns
    name: ColumnDrivers
    tensors: {keep: output}
    direction: up
    bits_per_action: average_output_bits_per_sliced_psum
    component_class: ArrayColumnDrivers

  - !Toll # Row drivers feed inputs onto the rows of the array
    name: RowDrivers
    tensors: {keep: input}
    direction: down
    bits_per_action: average_input_bits_per_slice
    component_class: ArrayRowDrivers
    extra_attributes_for_component_model:
      temporal_spiking: true

  - !Memory
    name: DummyRowDriverMemory
    component_class: Dummy
    size: {{ARRAY_ROWS}} * input.bits_per_value
    tensors: {keep: input}

  - !Container # Each column stores a different weight slice. Columns share inputs.
    name: Column
    spatial:
    - name: array_reuse_input
      fanout: {{ARRAY_COLS}}
      may_reuse: input
      reuse: input
      min_usage: 1
      usage_scale: n_weight_slices

  - !Container # Each row receives a different input. Rows share outputs.
    name: Row
    spatial:
    - name: array_reuse_output
      fanout: {{ARRAY_ROWS}}
      may_reuse: output
      reuse: output
      min_usage: 1

  # CiM unit stores weights and computes MACs.
  - !Memory
    name: CimUnit
    tensors: {keep: weight, no_refetch_from_above: weight} #, force_memory_hierarchy_order: False}
    size: cim_unit_width_cells * cim_unit_depth_cells * bits_per_cell * n_weight_slices
    bits_per_action: average_weight_bits_per_sliced_psum
    n_parallel_instances: n_weight_slices
    component_class: MemoryCell
    extra_attributes_for_component_model:
      n_instances: cim_unit_width_cells * cim_unit_depth_cells

  # We account for compute energy in the CimUnit reads
  - !Compute
    name: FreeCompute
    component_class: Dummy
    enabled: len(All) == 3


# These variables pertain to the workload, microarch, and circuits.
variables:
  inputs_hist: [0, 0, 0, 3, 1, 0, 0]
  weights_hist: [0, 1, 3, 4, 3, 1, 0]
  outputs_hist: inputs_hist

  ## Microarch ----------------------------------------------------------------
  supported_input_bits: 8
  supported_weight_bits: 8
  supported_output_bits: 8
  min_supported_input_bits: 1
  min_supported_weight_bits: 2
  min_supported_output_bits: 1

  # Circuits ------------------------------------------------------------------
  voltage: 1
  tech_node: 32e-9
  cell_config: "{{find_path('rram_isaac_isca_2016.yaml')}}"
  voltage_energy_scale: voltage ** 2
  voltage_latency_scale: voltage

  # Calibration ---------------------------------------------------------------
  adc_energy_scale: 1
  adc_area_scale: 1
  row_col_drivers_area_scale: 1


# This workload is sized to get peak throughput & energy efficiency.
workload:
  rank_sizes:
    M: 1
    N: {{ARRAY_COLS}}
    K: {{ARRAY_ROWS}}

  einsums:
  - name: Matmul
    tensor_accesses:
    - {name: input, projection: [m, k], bits_per_value: 8}
    - {name: weight, projection: [k, n], bits_per_value: 8}
    - {name: output, projection: [m, n], output: True, bits_per_value: 8}


renames: {}
