# EdgeRAG Architecture: NVIDIA Jetson Orin Nano
#
# Hardware:
#   CPU  Cortex-A78AE, 6-core, 1.2 GHz
#   GPU  Ampere, 1024 CUDA cores, 32 Tensor cores, 625 MHz
#   DRAM 8 GiB LPDDR5-4250, 64-bit bus  -> 34 GB/s peak BW
#   Storage 512 GB SD Card, UHS-I       -> ~104 MB/s peak BW
#   TDP  15 W
#
# Key corrections vs. the original template:
#   1. DRAM_BW:   34 GB/s  (LPDDR5-4250 × 64-bit bus ÷ 8)
#                 NOT 68 GB/s — the original assumed a 128-bit bus
#                 which Jetson Orin Nano does not have.
#   2. Disk BW:   0.104 GB/s (UHS-I SD card, ~104 MB/s max)
#                 NOT 7 GB/s — the original modelled an NVMe SSD.
#   3. MAC clock: 0.625 GHz (Ampere GPU boost clock on this SKU)
#                 NOT 1 GHz.
#   4. bits:      INT8 throughout (NanoLLM runs INT8 quantized inference).
#                 supported_*_bits set to 8 to match workload bits_per_value.
#   5. SRAM:      2 MB — closer to the real L2+L3 cache on Orin Nano
#                 (512 KB L2 + 2 MB L3). 8 MB was too optimistic.
#   6. Tensor placement: corpus_embeddings and corpus_tokens are
#                 explicitly pinned to MainMemory (DRAM), not SRAM.
#                 All model weights also live in DRAM (too large for SRAM).
#                 Only live intermediates (Q/K/V/attn/ffn activations) are
#                 kept in OnChipSRAM.

{% set DRAM_BW_GBps       = DRAM_BW_GBps       | default(34)    %}  {# LPDDR5-4250, 64-bit bus: 4250 MT/s × 8 B = 34 GB/s #}
{% set SRAM_READ_BW_GBps  = SRAM_READ_BW_GBps  | default(512)   %}  {# On-chip SRAM read  bandwidth in GB/s #}
{% set SRAM_WRITE_BW_GBps = SRAM_WRITE_BW_GBps | default(128)   %}  {# On-chip SRAM write bandwidth in GB/s #}
{% set SRAM_SIZE_MB       = SRAM_SIZE_MB       | default(2)     %}  {# On-chip SRAM: ~2 MB (L2 512 KB + L3 2 MB, conservatively 2 MB) #}
{% set DRAM_SIZE_GB       = DRAM_SIZE_GB       | default(8)     %}  {# 8 GiB LPDDR5 unified CPU+GPU memory #}
{% set MAC_ENERGY_pJ      = MAC_ENERGY_pJ      | default(0.084) %}  {# INT8 MAC energy in pJ (Ampere Tensor Core, similar to nvdla) #}
{% set MAC_CLOCK_GHz      = MAC_CLOCK_GHz      | default(0.625) %}  {# Ampere GPU clock on Jetson Orin Nano = 625 MHz #}
{% set DISK_BW_GBps       = DISK_BW_GBps       | default(0.104) %}  {# UHS-I SD card: ~104 MB/s = 0.104 GB/s #}

arch:
  nodes:

  # -----------------------------------------------------------------------
  # Tier 0 — SD Card storage (UHS-I, ~104 MB/s)
  #
  # Stores the raw tokenized document corpus (corpus_tokens).
  # corpus_embeddings are pre-computed offline and loaded into DRAM at
  # startup — they do NOT stream from disk during inference.
  #
  # BW: 0.104 GB/s (UHS-I hard limit — this is the dominant bottleneck
  # for any workload that must page documents from storage).
  # Energy: 0 — SD card controller energy not modelled at this level.
  #
  # Tensor policy:
  #   keep:     corpus_tokens only (raw document token IDs live on disk)
  #   may_keep: nothing else — all other tensors must be in DRAM or SRAM
  # -----------------------------------------------------------------------
  - !Memory
    name: SDCard
    size: 512*1024*1024*1024*8            # 512 GB in bits
    leak_power: 0
    area: 0
    actions:
    - {name: read,  energy: 0, latency: 1 / ({{DISK_BW_GBps}}e9 * 8)}
    - {name: write, energy: 0, latency: 1 / ({{DISK_BW_GBps}}e9 * 8)}
    tensors:
      keep: corpus_tokens                 # raw document token IDs reside on disk
      may_keep: ~All                      # nothing else spills to disk

  # -----------------------------------------------------------------------
  # Tier 1 — Off-chip DRAM (8 GiB LPDDR5-4250, unified CPU+GPU)
  #
  # All model weights, the FAISS embedding index, and retrieved document
  # buffers live here. Active intermediates are streamed to OnChipSRAM.
  #
  # BW derivation: LPDDR5-4250 = 4250 MT/s per pin
  #   Jetson Orin Nano uses a 64-bit (8-byte) bus:
  #   4250e6 × 8 B = 34 GB/s peak (single-channel)
  #
  # Energy: 7.03e-12 J/bit — standard LPDDR5 value (JEDEC spec,
  #   same as AccelForge nvdla.yaml / tpu_v4i.yaml).
  #
  # Tensor policy:
  #   Weights (enc_W_*, dec_W_*): always in DRAM — too large for SRAM.
  #     gte-base:        ~109 MB INT8
  #     Sheared-LLaMA:   ~2.7 GB INT8
  #   corpus_embeddings: pinned to DRAM (FAISS index, ~0.75 MB INT8) —
  #     small enough to fit in SRAM but kept in DRAM so the similarity
  #     search streams through the memory system, giving a realistic
  #     bandwidth cost model for the retrieval step.
  #   corpus_tokens:     may spill to DRAM after load from SDCard.
  #   Intermediates:     may_keep — spill here if SRAM overflows.
  # -----------------------------------------------------------------------
  - !Memory
    name: MainMemory
    size: {{DRAM_SIZE_GB}}*1024*1024*1024*8   # 8 GiB in bits
    leak_power: 0
    area: 0
    actions:
    - {name: read,  energy: 7.03e-12, latency: 1 / ({{DRAM_BW_GBps}}e9 * 8)}
    - {name: write, energy: 7.03e-12, latency: 1 / ({{DRAM_BW_GBps}}e9 * 8)}
    tensors:
      # Weights: all model weight tensors live permanently in DRAM.
      # Named explicitly so the scheduler never tries to promote them to SRAM
      # (they are far too large: 2.7 GB decoder + 109 MB encoder).
      keep: >
        enc_W_query | enc_W_key | enc_W_value | enc_W_out |
        enc_W_ffn_up | enc_W_ffn_down |
        dec_W_query | dec_W_key | dec_W_value | dec_W_out |
        dec_W_ffn_gate | dec_W_ffn_up | dec_W_ffn_down |
        dec_W_embed | dec_W_lm_head |
        corpus_embeddings | corpus_tokens
      # Intermediates may spill to DRAM if SRAM is full.
      may_keep: Intermediates

  # -----------------------------------------------------------------------
  # Tier 2 — On-chip SRAM (2 MB scratchpad, L2+L3 cache equivalent)
  #
  # Holds the live activation tensors during a single layer's forward pass:
  # encoder: enc_input, enc_queries/keys/values, enc_attn_*, enc_ffn_*
  # decoder: dec_input, dec_queries/keys/values, dec_attn_*, dec_ffn_*
  # retrieval: query_embedding, doc_scores, topk_doc_ids, topk_tokens
  #
  # Energy: 0.249e-12 read / 0.293e-12 write J/bit
  #   Source: TPU v4i LocalBuffer values (AccelForge tpu_v4i.yaml).
  # BW: separate read/write ports.
  #
  # Tensor policy:
  #   keep: Intermediates — live activations tile through here.
  #   Weights and the corpus index stay in DRAM (see MainMemory above).
  # -----------------------------------------------------------------------
  - !Memory
    name: OnChipSRAM
    size: {{SRAM_SIZE_MB}}*1024*1024*8        # 2 MB in bits
    total_latency: max(read_latency, write_latency)
    leak_power: 0
    area: {{SRAM_SIZE_MB}}e-6                 # ~1 mm^2 per MB at 16nm
    actions:
    - {name: read,  energy: 0.249e-12, latency: 1 / ({{SRAM_READ_BW_GBps}}e9 * 8)}
    - {name: write, energy: 0.293e-12, latency: 1 / ({{SRAM_WRITE_BW_GBps}}e9 * 8)}
    tensors:
      keep: Intermediates                 # only live activations tile through SRAM

  # -----------------------------------------------------------------------
  # Compute — INT8 MAC (Ampere Tensor Core)
  #
  # Fires for all 3-tensor einsums (input × weight → output).
  # Energy: 0.084 pJ/MAC — consistent with Ampere INT8 Tensor Core
  #   (same order as nvdla.yaml; Ampere INT8 is ~0.05–0.10 pJ/op).
  # Latency: one MAC per clock cycle at 625 MHz.
  # -----------------------------------------------------------------------
  - !Compute
    name: MAC
    leak_power: 0
    area: 9e-11
    actions:
    - {name: compute, energy: {{MAC_ENERGY_pJ}}e-12, latency: 1 / ({{MAC_CLOCK_GHz}}e9)}
    enabled: len(All) == 3

  # -----------------------------------------------------------------------
  # Compute — Copy (softmax placeholders, gather ops, embedding lookups)
  #
  # Fires for all 2-tensor einsums (is_copy_operation: True).
  # Zero compute energy — only memory read/write costs apply, which are
  # captured by the SRAM and MainMemory nodes above.
  # Latency uses the same clock so the scheduler can pipeline correctly.
  # -----------------------------------------------------------------------
  - !Compute
    name: Copy
    leak_power: 0
    area: 0
    actions:
    - {name: compute, energy: 0, latency: 1 / ({{MAC_CLOCK_GHz}}e9)}
    enabled: len(All) == 2

# INT8 throughout — matches workload bits_per_value: All: 8
# and NanoLLM's INT8 quantized inference on Jetson Orin Nano.
variables:
  supported_input_bits:  8
  supported_weight_bits: 8
  supported_output_bits: 8

renames: {}